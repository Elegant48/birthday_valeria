<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Cumpleaños, Valeria</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#FAF6F0;--gold:#C9A84C;--gold-light:#E8CB7A;--gold-pale:#F5E6C0;--rose-deep:#8B2252;--rose-mid:#C4527A;--rose-light:#F2BACF;--ink:#2C1A2E;--ink-soft:#5C3D5E;}
html,body{width:100%;height:100%;background:var(--cream);font-family:'Cormorant Garamond',Georgia,serif;overflow:hidden}
#intro-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--cream);z-index:100;transition:opacity 0.8s ease;}
.intro-logo{font-family:'Cinzel',serif;font-size:clamp(1rem,2.5vw,1.4rem);letter-spacing:.4em;color:var(--gold);margin-bottom:1.8rem;opacity:0;animation:fadeUp 1s .3s forwards}
.intro-h1{font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;font-size:clamp(2.8rem,8vw,5.5rem);color:var(--ink);line-height:1.05;text-align:center;opacity:0;animation:fadeUp 1s .7s forwards}
.intro-h1 span{color:var(--rose-deep);font-style:normal;font-weight:600}
.intro-divider{width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:1.8rem auto;opacity:0;animation:fadeIn 1s 1.1s forwards}
.intro-sub{font-size:clamp(.9rem,2vw,1.1rem);color:var(--ink-soft);letter-spacing:.1em;text-align:center;opacity:0;animation:fadeUp 1s 1.3s forwards}
#start-btn{margin-top:2.5rem;padding:.85rem 2.8rem;background:transparent;border:1px solid var(--gold);color:var(--gold);font-family:'Cinzel',serif;font-size:.85rem;letter-spacing:.25em;cursor:pointer;transition:background .3s,color .3s;opacity:0;animation:fadeUp 1s 1.7s forwards}
#start-btn:hover{background:var(--gold);color:var(--cream)}
#countdown-screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;background:var(--cream)}
.num-area{position:relative;z-index:10;text-align:center;padding-top:clamp(14px,3vh,28px);flex-shrink:0;}
.big-number{font-family:'Cinzel',serif;font-weight:700;font-size:clamp(4rem,12vw,8rem);color:transparent;-webkit-text-stroke:1.5px var(--gold);line-height:1;letter-spacing:.05em;display:inline-block;transition:opacity .4s;}
.num-line{width:min(160px,50vw);height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:.3rem auto 0;opacity:0;animation:fadeIn .8s .2s forwards}
#scene-wrap{flex:1;width:100%;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
#scene-bg{position:absolute;inset:0}
#scene-fig{position:relative;z-index:2;width:min(380px,88vw);height:min(380px,88vw);display:flex;align-items:center;justify-content:center;}
#scene-fig svg{width:100%;height:100%;overflow:visible}
.msg-bar{position:relative;z-index:10;text-align:center;padding:clamp(8px,2vh,18px) 1rem clamp(10px,2.5vh,22px);flex-shrink:0;}
.scene-msg{font-style:italic;font-size:clamp(.95rem,2.2vw,1.3rem);color:var(--ink-soft);line-height:1.5;width:min(520px,88vw);margin:0 auto;opacity:0;animation:fadeUp .8s .5s forwards;}
.corner{position:absolute;width:52px;height:52px;pointer-events:none;z-index:10}
.corner svg{width:100%;height:100%}
.c-tl{top:12px;left:12px}.c-tr{top:12px;right:12px;transform:scaleX(-1)}
.c-bl{bottom:12px;left:12px;transform:scaleY(-1)}.c-br{bottom:12px;right:12px;transform:scale(-1)}
.cake-hint{position:absolute;bottom:clamp(80px,14vh,120px);right:clamp(12px,4vw,40px);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.82rem;color:var(--gold);letter-spacing:.08em;opacity:0;animation:fadeIn 1s 2.5s forwards;pointer-events:none;z-index:20;background:rgba(250,246,240,.85);padding:4px 10px;border-radius:20px;border:1px solid var(--gold-pale);}
#final-screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:var(--cream);text-align:center;padding:2rem}
.final-eye{font-family:'Cinzel',serif;font-size:clamp(.7rem,1.5vw,.9rem);letter-spacing:.4em;color:var(--gold);margin-bottom:1.2rem;opacity:0;animation:fadeUp 1s .2s forwards}
.final-h2{font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;font-size:clamp(2.8rem,9vw,6rem);color:var(--ink);line-height:1.05;opacity:0;animation:fadeUp 1s .6s forwards}
.final-h2 em{color:var(--rose-deep);font-style:normal;font-weight:600}
.final-div{width:160px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:1.8rem auto;opacity:0;animation:fadeIn 1s 1s forwards}
.final-sig{font-style:italic;font-size:clamp(1.1rem,2.5vw,1.5rem);color:var(--gold);letter-spacing:.08em;opacity:0;animation:fadeUp 1s 1.2s forwards}
#final-crown{margin:1.5rem auto 0;opacity:0;animation:crownReveal 1.2s 1.6s forwards}
.petal{position:fixed;pointer-events:none;animation:petalFall linear forwards;z-index:200}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes crownReveal{0%{opacity:0;transform:scale(.6) translateY(20px)}70%{transform:scale(1.08) translateY(-4px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes petalFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(360deg);opacity:0}}
@keyframes flameDance{0%,100%{transform:scaleX(1) scaleY(1) translateY(0)}25%{transform:scaleX(.88) scaleY(1.12) translateY(-2px)}50%{transform:scaleX(1.1) scaleY(.94) translateY(1px)}75%{transform:scaleX(.92) scaleY(1.08) translateY(-1px)}}
@keyframes smokeUp{0%{opacity:.7;transform:translateY(0) scaleX(1)}100%{opacity:0;transform:translateY(-50px) scaleX(3)}}
@keyframes twinkle{0%,100%{opacity:.9;transform:scale(1)}50%{opacity:.2;transform:scale(.5)}}
@keyframes glimmer{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes drawPath{to{stroke-dashoffset:0}}
@keyframes petalSway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
@keyframes shimmer{0%,100%{opacity:0}40%,60%{opacity:1}}
@keyframes castleBuild{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes butterflyWing{0%,100%{transform:scaleX(1)}50%{transform:scaleX(.15)}}
@keyframes cameraFlash{0%{opacity:0}10%{opacity:1}30%{opacity:0}100%{opacity:0}}
@keyframes planeFly{0%{transform:translate(-80px,30px) rotate(-10deg)}100%{transform:translate(120px,-20px) rotate(-10deg)}}
@keyframes engineGlow{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes towerLight{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes crownGlow{0%,100%{filter:drop-shadow(0 0 4px #C9A84C)}50%{filter:drop-shadow(0 0 12px #E8CB7A)}}
</style>
</head>
<body>
<div id="intro-screen">
  <p class="intro-logo">ELEGANT</p>
  <h1 class="intro-h1">Para <span>Valeria</span></h1>
  <div class="intro-divider"></div>
  <p class="intro-sub">Una cuenta especial, con todo el cariño del mundo</p>
  <button id="start-btn" onclick="startCountdown()">COMENZAR</button>
</div>
<div id="countdown-screen">
  <div class="corner c-tl"><svg viewBox="0 0 52 52" fill="none"><path d="M2,50 L2,8 Q2,2 8,2 L50,2" stroke="#C9A84C" stroke-width="1" opacity=".6"/><circle cx="2" cy="2" r="2.5" fill="#C9A84C" opacity=".7"/></svg></div>
  <div class="corner c-tr"><svg viewBox="0 0 52 52" fill="none"><path d="M2,50 L2,8 Q2,2 8,2 L50,2" stroke="#C9A84C" stroke-width="1" opacity=".6"/><circle cx="2" cy="2" r="2.5" fill="#C9A84C" opacity=".7"/></svg></div>

  <div class="msg-bar">

<div id="final-screen">

  <div id="final-crown">

      <path d="M22,82 L22,38 L58,62 L110,8 L162,62 L198,38 L198,82 Z" fill="#F5E6C0" stroke="#C9A84C" stroke-width="2" stroke-linejoin="round"/>

      <text x="38" y="64" font-size="14" fill="#C9A84C" opacity=".6" style="animation:glimmer 1.5s infinite">✦</text>
      <text x="176" y="64" font-size="14" fill="#C9A84C" opacity=".6" style="animation:glimmer 1.8s .3s infinite">✦</text>
    </svg>

</div>
<script>
function bgStars(n=40){let s='';for(let i=0;i<n;i++){const x=Math.random()*100,y=Math.random()*100,r=.5+Math.random()*1.5;s+=`<circle cx="${x}%" cy="${y}%" r="${r}" fill="white" opacity="${.3+Math.random()*.7}" style="animation:twinkle ${1.5+Math.random()*2}s ${Math.random()*2}s infinite"/>`;}return s;}
function bgFlowers(){const fl=['🌸','🌼','🌺','🌷','🌻'];let s='';for(let i=0;i<18;i++){const x=5+Math.random()*90,y=5+Math.random()*90,sz=.6+Math.random()*.8;s+=`<text x="${x}%" y="${y}%" font-size="${sz}em" opacity="${.15+Math.random()*.25}" style="animation:float ${3+Math.random()*2}s ${Math.random()*2}s ease-in-out infinite">${fl[Math.floor(Math.random()*fl.length)]}</text>`;}return s;}

  nd.style.opacity='0';
  setTimeout(()=>{nd.textContent=sc.number;nd.style.transition='opacity .4s';nd.style.opacity='1';},120);
  nl.style.animation='none';nl.style.opacity='0';void nl.offsetWidth;nl.style.animation='fadeIn .8s .2s forwards';
  const m=document.getElementById('scene-msg');
  m.style.animation='none';m.style.opacity='0';m.textContent=sc.msg;void m.offsetWidth;m.style.animation='fadeUp .8s .5s forwards';
  const bg=document.getElementById('scene-bg');
  const fig=document.getElementById('scene-fig');
  bg.style.opacity='0';fig.style.opacity='0';
  bg.style.transition='opacity .4s';fig.style.transition='opacity .4s';
  setTimeout(()=>{
    const {bg:bgHTML,fig:figHTML}=sc.build();
    bg.innerHTML=bgHTML;fig.innerHTML=figHTML;
    bg.style.opacity='1';fig.style.opacity='1';
    if(sc.number===1){animateCake();document.getElementById('cake-hint').style.display='block';}
    else{document.getElementById('cake-hint').style.display='none';}
    cakeDone=false;blown=false;
  },350);
}

function animateCake(){
  if(cakeDone)return;cakeDone=true;
  const show=(id,delay)=>setTimeout(()=>{const el=document.getElementById(id);if(el)el.style.opacity='1';},delay);
  show('t3',300);show('t2',900);show('t1',1500);show('cg',2100);
}

function blowCandle(){
  if(blown)return;blown=true;
  const flame=document.getElementById('flame-g');
  const smoke=document.getElementById('smoke-g');
  const msg=document.getElementById('blown-msg');
  const conf=document.getElementById('confetti');
  if(!flame)return;
  flame.style.transition='transform .25s, opacity .4s';
  flame.style.transform='scaleX(2.5) scaleY(.2)';
  flame.style.opacity='.4';
  setTimeout(()=>{
    flame.style.transform='scale(0)';flame.style.opacity='0';
    if(smoke)smoke.removeAttribute('display');
    if(msg){msg.style.transition='opacity .6s';msg.style.opacity='1';}
    if(conf)conf.removeAttribute('display');
  },300);
}

function showFinal(){
  const cs=document.getElementById('countdown-screen');
  cs.style.transition='opacity .6s';cs.style.opacity='0';
  setTimeout(()=>{
    cs.style.display='none';
    document.getElementById('final-screen').style.display='flex';
    for(let i=0;i<30;i++)setTimeout(spawnPetal,i*200);
  },600);
}

function spawnPetal(){
  const opts=['🌸','🌹','✦','🌺','💖','🌷','✿','💫'];
  const el=document.createElement('div');
  el.className='petal';
  el.textContent=opts[Math.floor(Math.random()*opts.length)];
  el.style.left=Math.random()*100+'vw';
  el.style.fontSize=(0.8+Math.random()*1.3)+'rem';
  el.style.animationDuration=(3+Math.random()*4)+'s';
  el.style.animationDelay=(Math.random()*1)+'s';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),8000);
}
</script>
</body>
</html>
